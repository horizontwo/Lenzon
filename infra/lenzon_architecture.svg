      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1B3A5B" flood-opacity="0.20"/></filter>
  </defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<rect x="0" y="0" width="1280" height="6" fill="url(#accentbar)"/>
<text x="56" y="58" font-weight="800" font-size="30" fill="#0E2235">Lenzon — System Architecture</text>
<text x="56" y="86" font-weight="400" font-size="16" fill="#3E5572">From a GitHub repo or pull request to a narrated, animated codebase presentation</text>
