<text text-anchor="start" font-size="9.6" font-weight="400" fill="#3E5572"><tspan x="90" y="500">OAuth · orchestration · agent calls;</tspan><tspan x="90" y="512">brokers jobs + presigned URLs (never git</tspan><tspan x="90" y="524">clone)</tspan></text>
<rect x="74" y="542" width="270" height="74" rx="12" fill="url(#card)" stroke="#D4E3F0" stroke-width="1" filter="url(#soft)"/>
<path d="M74,554 A12,12 0 0 1 86,542 L332,542 A12,12 0 0 1 344,554 L344,549 L74,549 Z" fill="url(#secondary)"/>
