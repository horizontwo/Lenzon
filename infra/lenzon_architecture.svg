<text text-anchor="start" font-size="10.3" font-weight="400" fill="#3E5572"><tspan x="562" y="218">User picks AnalysisMode:</tspan><tspan x="562" y="231">overview, focused-brief,</tspan><tspan x="562" y="244">scorecard, walkthrough</tspan></text>
