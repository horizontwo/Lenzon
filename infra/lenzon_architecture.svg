<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Liberation Sans, Arial">
<defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5FAFF"/><stop offset="1" stop-color="#E9F2FB"/></linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D7AB7"/><stop offset="1" stop-color="#155A88"/></linearGradient>
    <linearGradient id="secondary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FC4EB"/><stop offset="1" stop-color="#3A9FD4"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A9FD4"/><stop offset="1" stop-color="#2B7FB5"/></linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#124A73"/><stop offset="1" stop-color="#155A88"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2F9E72"/><stop offset="1" stop-color="#23895F"/></linearGradient>
