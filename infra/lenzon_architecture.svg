<text x="560" y="480" text-anchor="start" font-size="10.5" font-weight="400" fill="#3E5572">HMAC handoff: API Gateway + Lambda  ·  SQS queues + EventBridge → Fargate</text>
<rect x="420" y="502" width="372" height="108" rx="11" fill="url(#card)" stroke="#D4E3F0" stroke-width="1" filter="url(#soft)"/>
<path d="M420,513 A11,11 0 0 1 431,502 L781,502 A11,11 0 0 1 792,513 L792,508 L420,508 Z" fill="url(#primary)"/>
<text x="436" y="532" text-anchor="start" font-size="12.5" font-weight="800" fill="#0E2235">Fargate clone worker</text>
<text text-anchor="start" font-size="9.8" font-weight="400" fill="#3E5572"><tspan x="436" y="552">SQS-driven · git clone with OAuth /</tspan><tspan x="436" y="565">GitHub-App token → tar → S3 → short-lived</tspan><tspan x="436" y="578">presigned URL the agent curls</tspan></text>
<rect x="820" y="502" width="380" height="108" rx="11" fill="url(#card)" stroke="#D4E3F0" stroke-width="1" filter="url(#soft)"/>
<path d="M820,513 A11,11 0 0 1 831,502 L1189,502 A11,11 0 0 1 1200,513 L1200,508 L820,508 Z" fill="url(#primary)"/>
<text x="836" y="532" text-anchor="start" font-size="12.5" font-weight="800" fill="#0E2235">Fargate render worker</text>
<text text-anchor="start" font-size="9.8" font-weight="400" fill="#3E5572"><tspan x="836" y="552">Playwright + ffmpeg → MP4 → S3; drives the</tspan><tspan x="836" y="565">async Pipeline API (repo → video) for batch</tspan><tspan x="836" y="578">renders</tspan></text>
