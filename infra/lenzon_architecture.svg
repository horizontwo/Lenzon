<polygon points="200.0,452.0 195.1,443.0 204.9,443.0" fill="#3A9FD4"/>
<text x="216" y="379" text-anchor="start" font-size="10" font-weight="400" fill="#1B3A52">pipeline orchestrated on Vercel; clone &amp; render offloaded to AWS</text>
